<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8">
    <title>Alexandre Decan</title>
    <link rel="stylesheet" href="simple.min.css">
    <style>
      @media (prefers-color-scheme: dark) {
        :root {
          color-scheme: light;
          --bg: #fff;
          --accent-bg: #f5f7ff;
          --text: #212121;
          --text-light: #585858;
          --accent: #0d47a1;
          --accent-hover: #1266e2;
          --accent-text: var(--bg);
          --code: #d81b60;
          --preformatted: #444;
          --marked: #ffdd33;
          --disabled: #efefef;
        }
      }
    </style>
    <script type="module" src="zero-md.min.js"></script>
  </head>
  <body>

    <zero-md id="mdapp" src="readme.md" manual-render></zero-md>
    <script language="javascript">
      customElements.whenDefined("zero-md").then(() => {
        mdapp.render({
          gfm: true,
          breaks: true,
        })
      })
    </script>
  </body>
</html>
